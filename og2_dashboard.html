            --secondary: #06b6d4;

            --glass-border: rgba(255, 255, 255, 0.08);

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Animations */
        .ambient-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;

            background: var(--glass-bg);
            backdrop-filter: blur(20px);

            border-radius: 1.25rem;

        .gradient-text {

            -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }

        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.8); }

        /* Tables */
.table-container {
    width: 100%;
    overflow-x: auto;
    border-radius: 1rem;

    will-change: transform;

    transform: translateZ(0);

    backface-visibility: hidden;
}
       table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;

    contain: content;
}
        
        th {
            background: rgba(15, 23, 42, 0.95);
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }
        
        td {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            font-size: 0.875rem;
            white-space: nowrap;
        }
        
        tr:hover td { background: rgba(37, 99, 235, 0.1); }

        /* Sticky Columns */
        .sticky-col {
            position: sticky;
            left: 0;
            background: rgba(15, 23, 42, 0.98) !important;
            z-index: 10;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        th.sticky-col { z-index: 20; }

        /* Popups & Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .drive-popup {
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border-radius: 1rem;
            animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Inputs & Buttons */
        .modern-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }
        .modern-input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;

        .btn-primary { background: linear-gradient(135deg, #2563eb, #0ea5e9); color: white; }

        .btn-success:hover { box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); transform: translateY(-1px); }

            background: rgba(15, 23, 42, 0.95);
            border-left: 4px solid var(--primary);

        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>

async function loadLatestCrewData() {

    try {

        const response = await fetch(CREW_API);

        const data = await response.json();

        const rows = data.values || [];

        const records = rows.slice(1);

        const crewMap = {};

        records.forEach(row => {

            const obj = {

                crewId: row[0] || "",
                crewName: row[1] || "",
                hrmsId: row[2] || "",
                crewType: row[3] || "",
                empCode: row[4] || "",
                crewGrade: row[5] || "",
                cliName: row[6] || "",
                hq: row[7] || "",
                updateDate: row[8] || "",
                allotmentType: row[9] || "Permanent",
                originalCLI: row[10] || "",
                status: (row[11] || "ACTIVE").toUpperCase()

            };

            if (!obj.empCode) return;

            if (!crewMap[obj.empCode]) {
                crewMap[obj.empCode] = [];
            }

            crewMap[obj.empCode].push(obj);

        });

        latestCrewData = Object.values(crewMap).map(records => {
            return records[records.length - 1];
        });

        console.log(
            "Latest Crew Loaded:",
            latestCrewData.length
        );
        // FAST CREW LOOKUP

crewMapByEmp = {};

        String(c.empCode).trim()
    ] = c;

});

    } catch (err) {

        console.error(
            "Crew Fetch Error:",
            err
        );

    }

];

    'SALP',
    'SHT',

];

const driveStats = {};

            LPG: 0,

const cliSummaryMap = {};

const completed =
historyMap.has(
    `${emp}|${drive}`
);

    function renderCLIMatrix(data) {
        let html = `<thead><tr><th class="sticky-col z-20">CLI Name</th>`;
        DRIVE_LIST.forEach(d => html += `<th>${d}</th>`);
        html += `</tr></thead><tbody>`;

        if (data.length === 0) {
            html += `<tr><td colspan="${DRIVE_LIST.length + 1}" class="text-center text-slate-500 py-6">No data available for selected filter</td></tr></tbody>`;
            document.getElementById('cliMatrixTable').innerHTML = html;
            return;
        }

        const matrix = {};
        data.forEach(r => {
            if(!matrix[r.cliName]) matrix[r.cliName] = {};
            matrix[r.cliName][r.drive] = (matrix[r.cliName][r.drive] || 0) + 1;
        });

        Object.keys(matrix).sort().forEach(cli => {
            html += `<tr><td class="sticky-col font-medium text-white">${cli}</td>`;
            DRIVE_LIST.forEach(d => {
                const count = matrix[cli][d] || 0;
                if(count > 0) {
                    html += `<td class="text-center"><span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2.5 py-1 rounded-md text-xs font-bold">${count}</span></td>`;
                } else {
                    html += `<td class="text-center text-slate-600">-</td>`;
                }
            });
            html += `</tr>`;
        });
        html += `</tbody>`;
        document.getElementById('cliMatrixTable').innerHTML = html;
    }
    function normalizeDate(dateStr) {

    if (!dateStr) return '';

    dateStr =
    String(dateStr).trim();

    // ISO Date Handling
    if (dateStr.includes('T')) {

        const date = new Date(dateStr);

        const day =
        String(date.getDate()).padStart(2, '0');

        const month =
        String(date.getMonth() + 1).padStart(2, '0');

        const year =
        date.getFullYear();

        return `${day}/${month}/${year}`;
    }

    const parts =
    dateStr.split('/');

    if (parts.length !== 3)
        return dateStr;

    const day =
    String(parts[0]).trim()
    .padStart(2,'0');

    const month =
    String(parts[1]).trim()
    .padStart(2,'0');

    let year =
    String(parts[2]).trim();

    if (year.length === 2) {
        year = '20' + year;
    }

    return `${day}/${month}/${year}`;
}
function formatDisplayDate(dateStr) {

    if (!dateStr) return '';

    // ISO Date Handling
    if (dateStr.includes('T')) {

        const isoPart =
dateStr.split('T')[0];

const [year, month, day] =
isoPart.split('-');

return `${day}/${month}/${year}`;
    }

    // Already Normal Format
    return normalizeDate(dateStr);
}
